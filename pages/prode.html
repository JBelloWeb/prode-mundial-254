<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Prode 254</title>
</head>
<body>
    <h1>Prode Mundial 2026</h1>

    <section id="seccionSeleccion">
        <h2>Fase de Grupos</h2>
        <p>Elije 3 países más para predecir sus partidos (Argentina es obligatorio)</p>
        <div id="countrySelector"></div>

        <div id="elecciones"></div>

        <button id="btnGenerarFormulario">Continuar a Pronósticos</button>
    </section>

    <section id="seccionPronosticos">
        <h2>Partidos a Predecir</h2>
        <form id="formGrupos">
            <div id="contenedorPartidos"></div>
            <button type="submit" id="btnGuardar">Guardar Pronósticos</button>
        </form>
    </section>

    <script src="../js/groups.js"></script>
</body>
</html>
