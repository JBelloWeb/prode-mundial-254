<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://kit.fontawesome.com/2cd34b61aa.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Mi Panel - Prode 254</title>
</head>
<body>
<header id="panelHeader">
    <div class="header-top">
        <h1 id="bienvenidaDashboard">Cargando perfil...</h1>
        <button id="btnCerrarSesion" title="Cerrar Sesión">
            Salir <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
    </div>
    
    <div id="puntajeContainer">
        <div class="puntaje-box total">
            <span class="puntaje-label">Puntos Totales</span>
            <span class="puntaje-valor" id="puntosTotales">0</span>
        </div>
        
        <div class="puntajes-secundarios">
            <div class="puntaje-box detalle">
                <span class="puntaje-label">Plenos:</span>
                <span class="puntaje-valor" id="puntosPlenos">0</span>
            </div>
            <div class="puntaje-box detalle">
                <span class="puntaje-label">Parciales:</span>
                <span class="puntaje-valor" id="puntosParciales">0</span>
            </div>
        </div>
    </div>
</header>

    <nav class="dashboard-nav">
        <button id="btnTabPerfil" style="font-weight: bold;">Mi Perfil</button>
        <button id="btnTabRanking">🏆 Ranking Global</button>
    </nav>

    <main class="dashboard-main">
        <section id="accionesProde">
            <button id="btnIrGrupos">📝 Predecir Grupos</button>
            <button id="btnIrMataMata">🏆 Predecir Mata-Mata</button>
        </section>

        <div id="vistaPerfil">
            <section id="misEquipos">
                <h2>Equipos Seguidos</h2>
                <ul id="listaEquipos"></ul>
            </section>

            <section id="misPronosticos">
                <h2>Mis Predicciones</h2>
                <div id="tablaPronosticos"></div>
            </section>
        </div>
        <div id="vistaRanking" style="display: none;">
            <section id="seccionRanking">
                <h2>Tabla de Posiciones</h2>
                <table style="text-align: center; margin: 0 auto;">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Jugador</th>
                            <th>Puntos</th>
                            <th>Plenos</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaRanking">
                        <tr><td colspan="4">Cargando posiciones...</td></tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="../js/dashboard.js"></script>
</body>
</html>
